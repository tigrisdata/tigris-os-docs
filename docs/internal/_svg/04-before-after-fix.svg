  <text x="480" y="44" fill="#c8d6de" font-size="24" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="480" dy="0">The Fix: Reorder, Evict Before Delete</tspan></text>
  <g opacity="0.3"><rect x="40" y="80" width="660" height="560" rx="8" ry="8" fill="#142229" stroke="#CF5B5B" stroke-width="1.5" stroke-dasharray="6 4"/></g>
  <text x="58" y="112" fill="#CF5B5B" font-size="16" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="58" dy="0">Before — race window</tspan></text>
  <g opacity="0.3"><rect x="780" y="80" width="660" height="560" rx="8" ry="8" fill="#142229" stroke="#62FEB5" stroke-width="1.5" stroke-dasharray="6 4"/></g>
  <text x="798" y="112" fill="#62FEB5" font-size="16" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="798" dy="0">After — eager eviction under lock</tspan></text>
