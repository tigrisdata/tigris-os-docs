  <text x="820" y="561" fill="#8fa3b0" font-size="13" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="820" dy="0">Defense-in-depth: deferred eviction + tombstone still run after —</tspan><tspan x="820" dy="15.6">blocks stale re-population from async replication.</tspan></text>
