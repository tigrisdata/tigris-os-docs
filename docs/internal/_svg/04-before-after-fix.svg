  <text x="100" y="313" fill="#CF5B5B" font-size="15" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="100" dy="0">RACE WINDOW</tspan></text>
  <text x="100" y="341" fill="#CF5B5B" font-size="13" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="100" dy="0">concurrent GET hits cache → returns stale 200</tspan></text>
  <g opacity="1"><rect x="80" y="392" width="480" height="46" rx="8" ry="8" fill="#142229" stroke="#2a4050" stroke-width="2"/></g>
  <text x="100" y="420" fill="#c8d6de" font-size="15" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="100" dy="0">3. (deferred) evict cache entry</tspan></text>
