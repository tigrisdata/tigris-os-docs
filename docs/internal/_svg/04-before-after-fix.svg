  <text x="100" y="178" fill="#c8d6de" font-size="15" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="100" dy="0">1. acquire key lock</tspan></text>
  <g opacity="1"><rect x="80" y="216" width="480" height="46" rx="8" ry="8" fill="#142229" stroke="#2a4050" stroke-width="2"/></g>
  <text x="100" y="244" fill="#c8d6de" font-size="15" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="100" dy="0">2. deleteObjects() — FDB delete succeeds</tspan></text>
