  <g opacity="1"><rect x="820" y="216" width="480" height="46" rx="8" ry="8" fill="#142229" stroke="#62FEB5" stroke-width="2.5"/></g>
  <text x="840" y="244" fill="#62FEB5" font-size="15" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="840" dy="0">2. evict cache entry   (moved up)</tspan></text>
  <g opacity="1"><rect x="820" y="282" width="480" height="46" rx="8" ry="8" fill="#142229" stroke="#2a4050" stroke-width="2"/></g>
  <text x="840" y="310" fill="#c8d6de" font-size="15" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="840" dy="0">3. deleteObjects() — FDB delete</tspan></text>
  <g opacity="0.15"><rect x="820" y="348" width="480" height="44" rx="8" ry="8" fill="#62FEB5" stroke="#62FEB5" stroke-width="1.5" stroke-dasharray="6 4"/></g>
