<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="40 0 1510 630" width="1510" height="630" style="background:#0e1920">
  <text x="460" y="44" fill="#c8d6de" font-size="24" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="460" dy="0">Three Layers of Cache-Coherence Defense</tspan></text>
  <text x="420" y="72" fill="#8fa3b0" font-size="14" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="420" dy="0">Each layer catches what the one above it misses</tspan></text>
  <g opacity="1"><rect x="280" y="120" width="900" height="130" rx="8" ry="8" fill="#142229" stroke="#62FEB5" stroke-width="2.5"/></g>
  <text x="300" y="154" fill="#62FEB5" font-size="14" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="300" dy="0">L1</tspan></text>
  <text x="340" y="160" fill="#c8d6de" font-size="20" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="340" dy="0">Write Path — Eager Invalidation</tspan></text>
  <text x="300" y="193" fill="#8fa3b0" font-size="13" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="300" dy="0">Every mutation evicts the cache entry BEFORE the mutation commits to the primary store, not after.</tspan></text>
  <text x="300" y="223" fill="#8fa3b0" font-size="13" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="300" dy="0">Closes the gap between "source of truth changed" and "cache knows about it."</tspan></text>
  <g opacity="1"><rect x="280" y="300" width="900" height="130" rx="8" ry="8" fill="#142229" stroke="#5BA4CF" stroke-width="2.5"/></g>
  <text x="300" y="334" fill="#5BA4CF" font-size="14" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="300" dy="0">L2</tspan></text>
  <text x="340" y="340" fill="#c8d6de" font-size="20" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="340" dy="0">Read Path — Tombstone Barriers</tspan></text>
  <text x="300" y="373" fill="#8fa3b0" font-size="13" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="300" dy="0">Timestamp check on every cache-write path blocks stale re-population.</tspan></text>
  <text x="300" y="403" fill="#8fa3b0" font-size="13" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="300" dy="0">Catches stale data even if eviction failed or Redis was unreachable.</tspan></text>
  <g opacity="1"><rect x="280" y="480" width="900" height="130" rx="8" ry="8" fill="#142229" stroke="#CF8E5B" stroke-width="2.5"/></g>
  <text x="300" y="514" fill="#CF8E5B" font-size="14" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="300" dy="0">L3</tspan></text>
  <text x="340" y="520" fill="#c8d6de" font-size="20" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="340" dy="0">Replication Boundary — Timestamp Ordering</tspan></text>
  <text x="300" y="553" fill="#8fa3b0" font-size="13" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="300" dy="0">Incoming replication events compare LastModified. Newer data always wins, regardless of arrival order.</tspan></text>
  <text x="300" y="583" fill="#8fa3b0" font-size="13" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="300" dy="0">Prevents older copies from overwriting newer ones across regions.</tspan></text>
  <g opacity="1"><path d="M180,580 L180,180" fill="none" stroke="#CF5B5B" stroke-width="2.5" stroke-linecap="round"/><polyline points="184.7022820183398,186.47213595499957 180,180 175.2977179816602,186.47213595499957" fill="none" stroke="#CF5B5B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></g>
  <text x="60" y="375" fill="#CF5B5B" font-size="15" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="60" dy="0">Failure modes</tspan></text>
  <text x="72" y="405" fill="#8fa3b0" font-size="13" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="72" dy="0">escalate</tspan></text>
  <g opacity="0.5"><rect x="1230" y="120" width="300" height="130" rx="8" ry="8" fill="#142229" stroke="#1e3340" stroke-width="1" stroke-dasharray="6 4"/></g>
  <text x="1250" y="151" fill="#8fa3b0" font-size="13" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="1250" dy="0">Catches</tspan></text>
  <text x="1250" y="183" fill="#c8d6de" font-size="13" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="1250" dy="0">Direct writes where the</tspan></text>
  <text x="1250" y="205" fill="#c8d6de" font-size="13" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="1250" dy="0">cache is reachable and</tspan></text>
  <text x="1250" y="227" fill="#c8d6de" font-size="13" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="1250" dy="0">eviction succeeds.</tspan></text>
  <g opacity="0.5"><rect x="1230" y="300" width="300" height="130" rx="8" ry="8" fill="#142229" stroke="#1e3340" stroke-width="1" stroke-dasharray="6 4"/></g>
  <text x="1250" y="331" fill="#8fa3b0" font-size="13" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="1250" dy="0">Catches</tspan></text>
  <text x="1250" y="363" fill="#c8d6de" font-size="13" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="1250" dy="0">Stale re-population via</tspan></text>
  <text x="1250" y="385" fill="#c8d6de" font-size="13" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="1250" dy="0">async events after a</tspan></text>
  <text x="1250" y="407" fill="#c8d6de" font-size="13" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="1250" dy="0">successful delete.</tspan></text>
  <g opacity="0.5"><rect x="1230" y="480" width="300" height="130" rx="8" ry="8" fill="#142229" stroke="#1e3340" stroke-width="1" stroke-dasharray="6 4"/></g>
  <text x="1250" y="511" fill="#8fa3b0" font-size="13" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="1250" dy="0">Catches</tspan></text>
  <text x="1250" y="543" fill="#c8d6de" font-size="13" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="1250" dy="0">Out-of-order or retried</tspan></text>
  <text x="1250" y="565" fill="#c8d6de" font-size="13" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="1250" dy="0">replication events that</tspan></text>
  <text x="1250" y="587" fill="#c8d6de" font-size="13" font-family="Virgil, 'Comic Sans MS', cursive, sans-serif" opacity="1"><tspan x="1250" dy="0">would rewind state.</tspan></text>
</svg>
